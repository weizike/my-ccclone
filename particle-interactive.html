<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粒子交互 — Gemini 风格</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    cursor: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas { display: block; }

  /* ── 控制面板 ── */
  #panel {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(20, 20, 35, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 10;
    transition: opacity 0.4s;
  }
  #panel button {
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    color: #ccc;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
  }
  #panel button:hover { background: rgba(255,255,255,0.14); color: #fff; }
  #panel button.active { background: rgba(120,140,255,0.25); border-color: rgba(140,160,255,0.5); color: #fff; }

  /* ── FPS 和粒子数 ── */
  #stats {
    position: fixed;
    top: 20px;
    right: 24px;
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    z-index: 10;
    text-align: right;
    line-height: 1.6;
  }

  /* ── 提示 ── */
  #hint {
    position: fixed;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    z-index: 10;
    pointer-events: none;
    transition: opacity 1.5s;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="stats"><div id="fps">FPS: --</div><div id="count">粒子: --</div></div>
<div id="hint">✦ 移动鼠标探索  ·  滚轮调节粒子数  ·  点击切换模式</div>

<div id="panel">
  <button data-mode="flow"   class="active">🌊 流光</button>
  <button data-mode="galaxy">🌀 星系</button>
  <button data-mode="burst" >💥 爆发</button>
  <button data-mode="grid"  >🔷 网格</button>
  <button data-mode="vortex">🌪 漩涡</button>
</div>

<script>
// ═══════════════════════════════════════════
//  Gemini-style interactive particle system
// ═══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
let mode = 'flow';
let mouse = { x: -9999, y: -9999, down: false };
let targetCount = 180;
let particles = [];
let frameCount = 0;
let lastFpsTime = performance.now();
let fps = 0;

// ── 颜色调色板 ──
const palettes = {
  flow:   ['#60a5fa','#818cf8','#a78bfa','#c084fc','#e879f9','#38bdf8'],
  galaxy: ['#fbbf24','#f59e0b','#ef4444','#ec4899','#8b5cf6','#3b82f6'],
  burst:  ['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#4dabf7','#da77f2'],
  grid:   ['#22d3ee','#2dd4bf','#34d399','#60a5fa','#818cf8','#a78bfa'],
  vortex: ['#f472b6','#e879f9','#c084fc','#818cf8','#38bdf8','#22d3ee'],
};

// ═══ 粒子类 ═══
class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = (Math.random() - 0.5) * 0.6;
    this.radius = 1.6 + Math.random() * 2.6;
    this.baseRadius = this.radius;
    this.opacity = 0.35 + Math.random() * 0.55;
    this.color = palettes[mode][Math.floor(Math.random() * palettes[mode].length)];
    this.phase = Math.random() * Math.PI * 2;
    this.life = 0;
  }
}

// ═══ 初始化 ═══
function initParticles(count) {
  particles = [];
  for (let i = 0; i < count; i++) {
    const p = new Particle();
    p.life = Math.random(); // 错开出生
    particles.push(p);
  }
}

// ═══ 调整大小 ═══
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  // 粒子按比例调整
  if (particles.length > 0) {
    const scaleX = W / (canvas.__oldW || W);
    const scaleY = H / (canvas.__oldH || H);
    for (const p of particles) {
      p.x *= scaleX; p.y *= scaleY;
      if (p.x > W) p.x = W; if (p.y > H) p.y = H;
    }
  }
  canvas.__oldW = W; canvas.__oldH = H;
}

// ═══ 模式行为 ═══
function applyModeBehavior(p, dt) {
  const mx = mouse.x, my = mouse.y;
  const dx = mx - p.x, dy = my - p.y;
  const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
  const nx = dx / dist, ny = dy / dist;

  switch (mode) {
    case 'flow':
      // 鼠标吸引 + 噪声扰动
      if (dist < 220) {
        const force = (1 - dist / 220) * 0.8;
        p.vx += nx * force * dt;
        p.vy += ny * force * dt;
      }
      // Perlin-like 扰动
      p.vx += Math.sin(p.phase + frameCount * 0.008) * 0.04 * dt;
      p.vy += Math.cos(p.phase + frameCount * 0.009) * 0.04 * dt;
      break;

    case 'galaxy':
      // 绕鼠标旋转
      if (dist < 400 && dist > 30) {
        const orbitSpeed = (1 - dist / 400) * 2.5;
        // 切向力
        p.vx += (-ny) * orbitSpeed * dt;
        p.vy += (nx) * orbitSpeed * dt;
        // 微弱向心力
        const pull = (1 - dist / 400) * 0.15;
        p.vx += -nx * pull * dt;
        p.vy += -ny * pull * dt;
      }
      break;

    case 'burst':
      // 鼠标排斥
      if (dist < 160) {
        const force = (1 - dist / 160) * 3.5;
        p.vx -= nx * force * dt;
        p.vy -= ny * force * dt;
      }
      // 减速摩擦
      p.vx *= 0.985;
      p.vy *= 0.985;
      break;

    case 'grid':
      // 网格对齐 + 鼠标扰动
      const snapDist = 70;
      p.vx *= 0.96; p.vy *= 0.96;
      if (dist < 180) {
        const force = (1 - dist / 180) * 1.2;
        p.vx += nx * force * dt;
        p.vy += ny * force * dt;
      }
      break;

    case 'vortex':
      // 双漩涡
      const cx = W * 0.35;
      const cy = H * 0.5;
      const dx1 = cx - p.x, dy1 = cy - p.y;
      const d1 = Math.sqrt(dx1*dx1 + dy1*dy1) || 0.001;
      const cx2 = W * 0.65;
      const dx2 = cx2 - p.x, dy2 = cy - p.y;
      const d2 = Math.sqrt(dx2*dx2 + dy2*dy2) || 0.001;

      const vortex1 = 180 / (1 + d1 / 90);
      const vortex2 = 180 / (1 + d2 / 90);
      const n1x = dx1/d1, n1y = dy1/d1;
      const n2x = dx2/d2, n2y = dy2/d2;
      p.vx += (-n1y * vortex1 - n2y * vortex2) * 0.25 * dt;
      p.vy += (n1x * vortex1 + n2x * vortex2) * 0.25 * dt;

      if (dist < 140) {
        const force = (1 - dist / 140) * 2;
        p.vx -= nx * force * dt;
        p.vy -= ny * force * dt;
      }
      break;
  }

  // 全局速度限制
  const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
  const maxSpeed = mode === 'burst' ? 6 : 3.5;
  if (speed > maxSpeed) {
    const ratio = maxSpeed / speed;
    p.vx *= ratio; p.vy *= ratio;
  }
}

// ═══ 渲染 ═══
function drawParticle(p) {
  const alpha = p.opacity * (0.6 + 0.4 * Math.sin(p.life * 3 + p.phase));
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
  ctx.fillStyle = p.color;
  ctx.globalAlpha = alpha;
  ctx.fill();

  // 辉光
  if (p.radius > 2.0) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * 2.8, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 2.8);
    grad.addColorStop(0, p.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.globalAlpha = alpha * 0.18;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawConnection(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const maxDist = mode === 'grid' ? 80 : 100;

  if (dist < maxDist) {
    const alpha = (1 - dist / maxDist) * 0.18;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = a.color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// ═══ 鼠标光标 ═══
function drawCursor() {
  if (mouse.x < 0 || mouse.y < 0) return;
  const t = performance.now() * 0.001;

  // 外环
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 14 + Math.sin(t * 3) * 2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 内点
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fill();

  // 脉冲
  const pulseR = 22 + Math.sin(t * 4) * 6;
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, pulseR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ═══ 主循环 ═══
function update(dt) {
  // 平滑粒子数
  const delta = targetCount - particles.length;
  if (delta > 0) {
    for (let i = 0; i < Math.min(delta, 4); i++) {
      particles.push(new Particle());
    }
  } else if (delta < 0) {
    particles.splice(targetCount, -delta);
  }

  for (const p of particles) {
    applyModeBehavior(p, dt);
    p.x += p.vx;
    p.y += p.vy;

    // 边界反弹（柔和）
    const margin = 40;
    if (p.x < -margin) p.x = W + margin;
    if (p.x > W + margin) p.x = -margin;
    if (p.y < -margin) p.y = H + margin;
    if (p.y > H + margin) p.y = -margin;

    // 边界软约束
    if (p.x < 0) p.vx += 0.3 * dt;
    if (p.x > W) p.vx -= 0.3 * dt;
    if (p.y < 0) p.vy += 0.3 * dt;
    if (p.y > H) p.vy -= 0.3 * dt;

    p.life += 0.005 * dt;
    // 呼吸效果
    p.radius = p.baseRadius * (0.8 + 0.2 * Math.sin(p.life * 1.5 + p.phase));
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // 暗色背景渐变
  const bg = ctx.createRadialGradient(mouse.x, mouse.y, 0, W/2, H/2, Math.max(W,H)*0.8);
  bg.addColorStop(0, 'rgba(18,18,40,0.35)');
  bg.addColorStop(1, 'rgba(8,8,16,1)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 连线（先画，在下层）
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      drawConnection(particles[i], particles[j]);
    }
  }

  // 粒子
  for (const p of particles) {
    drawParticle(p);
  }

  // 光标
  drawCursor();

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 500) {
    fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('fps').textContent = `FPS: ${fps}`;
    document.getElementById('count').textContent = `粒子: ${particles.length}`;
  }
}

function loop(timestamp) {
  const dt = Math.min(16.67 / 16.67, 2.5); // 以 60fps 为基准
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ═══ 事件 ═══
window.addEventListener('resize', resize);

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
window.addEventListener('mouseenter', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

window.addEventListener('click', e => {
  // 切换模式：循环
  const modes = ['flow','galaxy','burst','grid','vortex'];
  const idx = modes.indexOf(mode);
  mode = modes[(idx + 1) % modes.length];
  document.querySelectorAll('#panel button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  // 更新粒子颜色
  for (const p of particles) {
    p.color = palettes[mode][Math.floor(Math.random() * palettes[mode].length)];
  }
});

window.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -20 : 20;
  targetCount = Math.max(40, Math.min(600, targetCount + delta));
}, { passive: false });

// 控制面板按钮
document.querySelectorAll('#panel button').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    mode = btn.dataset.mode;
    document.querySelectorAll('#panel button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    for (const p of particles) {
      p.color = palettes[mode][Math.floor(Math.random() * palettes[mode].length)];
    }
  });
});

// 触摸支持
window.addEventListener('touchmove', e => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchend', () => { mouse.x = -9999; mouse.y = -9999; });

// ═══ 启动 ═══
resize();
initParticles(targetCount);
requestAnimationFrame(loop);

// 渐隐提示
setTimeout(() => {
  const hint = document.getElementById('hint');
  hint.style.opacity = '0';
  setTimeout(() => hint.remove(), 1500);
}, 8000);
</script>
</body>
</html>
