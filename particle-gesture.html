<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手势粒子交互</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#08080f;overflow:hidden;font-family:'Segoe UI',sans-serif;user-select:none}
  canvas#main{display:block;position:fixed;top:0;left:0;z-index:0}
  #cam-panel{position:fixed;bottom:24px;right:24px;z-index:20;width:240px;border-radius:18px;overflow:hidden;border:2px solid rgba(255,255,255,0.12);box-shadow:0 8px 32px rgba(0,0,0,0.5)}
  #cam-panel video,#cam-panel canvas{display:block;width:100%}
  #cam-panel video{transform:scaleX(-1)}
  #cam-panel canvas{position:absolute;top:0;left:0;transform:scaleX(-1)}
  #gesture-hud{position:fixed;top:24px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:20}
  .badge{padding:7px 16px;border-radius:20px;background:rgba(20,20,40,0.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.1);color:#999;font-size:13px;transition:all 0.35s}
  .badge.on{background:rgba(100,130,255,0.25);border-color:rgba(130,160,255,0.5);color:#fff;box-shadow:0 0 18px rgba(100,130,255,0.18)}
  #mn{position:fixed;top:88px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.7);font-size:19px;letter-spacing:2px;z-index:20;pointer-events:none}
  #stats{position:fixed;bottom:28px;left:28px;z-index:20;color:rgba(255,255,255,0.3);font-size:11px;line-height:1.7}
  #msg{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:13px;z-index:20;pointer-events:none;transition:opacity 0.6s}
</style>
</head>
<body>

<canvas id="main"></canvas>

<div id="gesture-hud">
  <span class="badge" data-g="flow">🌊 流光</span>
  <span class="badge" data-g="galaxy">🌀 星系</span>
  <span class="badge" data-g="burst">💥 迸发</span>
  <span class="badge" data-g="grid">🔷 网络</span>
  <span class="badge" data-g="vortex">🌪 漩涡</span>
</div>
<div id="mn"></div>
<div id="cam-panel">
  <video id="cam" autoplay playsinline></video>
  <canvas id="co"></canvas>
</div>
<div id="msg">🧠 正在加载 AI 手势模型...</div>
<div id="stats">
  <div id="fps">FPS: --</div>
  <div id="cnt">粒子: --</div>
  <div id="gs">手势: --</div>
</div>

<script type="module">
// ═══════════════════════════════════════════════════════
//  Gemini-style particles  ·  MediaPipe Hand gesture
// ═══════════════════════════════════════════════════════
import { HandLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm';

const $=id=>document.getElementById(id);
const main=$('main'), ctx=main.getContext('2d');
const cam=$('cam'), co=$('co'), coCtx=co.getContext('2d');
const mn=$('mn'), msg=$('msg');

let W,H, particles=[], target=200, mode='flow';
let hc={x:-999,y:-999,v:false}, gesture='none', pinch=0;
let fc=0,lt=0,fps=0, lm=null, lvt=-1, mpReady=false;
const pal={
  flow:['#60a5fa','#818cf8','#a78bfa','#c084fc','#38bdf8'],
  galaxy:['#fbbf24','#f59e0b','#ec4899','#8b5cf6','#3b82f6'],
  burst:['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#da77f2'],
  grid:['#22d3ee','#2dd4bf','#34d399','#60a5fa','#a78bfa'],
  vortex:['#f472b6','#e879f9','#c084fc','#818cf8','#22d3ee'],
};
const names={flow:'🌊 流光',galaxy:'🌀 星系',burst:'💥 迸发',grid:'🔷 网络',vortex:'🌪 漩涡'};

class P{constructor(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.5;this.vy=(Math.random()-.5)*.5;this.br=1.5+Math.random()*2.5;this.r=this.br;this.a=.35+Math.random()*.55;this.c=pal[mode][Math.random()*pal[mode].length|0];this.ph=Math.random()*Math.PI*2;this.l=Math.random()}}

// ── Gesture ──
function fu(lm,t,p){return lm[t].y<lm[p].y-.02}
function det(lm){
  if(!lm||lm.length<21)return'none';
  const iu=fu(lm,8,6),mu=fu(lm,12,10),ru=fu(lm,16,14),pu=fu(lm,20,18);
  const tu=Math.abs(lm[4].x-lm[2].x)>Math.abs(lm[4].y-lm[2].y)*1.2&&lm[4].y<lm[0].y;
  const up=[tu,iu,mu,ru,pu].filter(Boolean).length;
  const pd=Math.hypot(lm[4].x-lm[8].x,lm[4].y-lm[8].y);
  if(pd<.05)return'pinch';if(up===0)return'fist';if(up>=4)return'open';
  if(up===1&&iu)return'point';if(up===2&&iu&&mu&&!ru)return'peace';
  if(up===3&&iu&&mu&&ru)return'three';return'other';
}
const gmap={point:'flow',peace:'galaxy',open:'burst',three:'grid',fist:'vortex'};

// ── Physics ──
function phys(p,dt,cx,cy){
  const dx=cx-p.x,dy=cy-p.y,d=Math.hypot(dx,dy)||.001,nx=dx/d,ny=dy/d;
  switch(mode){
    case'flow':if(d<240){const f=(1-d/240)*1.1;p.vx+=nx*f*dt;p.vy+=ny*f*dt}p.vx+=Math.sin(p.ph+fc*.008)*.04*dt;p.vy+=Math.cos(p.ph+fc*.009)*.04*dt;break;
    case'galaxy':if(d<420&&d>25){const s=(1-d/420)*3;p.vx+=-ny*s*dt;p.vy+=nx*s*dt;p.vx+=-nx*(1-d/420)*.18*dt;p.vy+=-ny*(1-d/420)*.18*dt}break;
    case'burst':if(d<180){const f=(1-d/180)*4.5;p.vx-=nx*f*dt;p.vy-=ny*f*dt}p.vx*=.982;p.vy*=.982;break;
    case'grid':p.vx*=.955;p.vy*=.955;if(d<200){const f=(1-d/200)*1.5;p.vx+=nx*f*dt;p.vy+=ny*f*dt}break;
    case'vortex':{const c1x=W*.35,c2x=W*.65,c1y=H*.5;const d1=Math.hypot(c1x-p.x,c1y-p.y)||.001,d2=Math.hypot(c2x-p.x,c1y-p.y)||.001;p.vx+=(-(c1y-p.y)/d1*200/(1+d1/90)-(c1y-p.y)/d2*200/(1+d2/90))*.25*dt;p.vy+=((c1x-p.x)/d1*200/(1+d1/90)+(c2x-p.x)/d2*200/(1+d2/90))*.25*dt;if(d<160){const f=(1-d/160)*2.5;p.vx-=nx*f*dt;p.vy-=ny*f*dt}}break;
  }
  const sp=Math.hypot(p.vx,p.vy),mx=mode==='burst'?7:4;if(sp>mx){const r=mx/sp;p.vx*=r;p.vy*=r}
}

// ── Draw ──
function conn(a,b){const d=Math.hypot(a.x-b.x,a.y-b.y),mx=mode==='grid'?85:105;if(d<mx){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=a.c;ctx.globalAlpha=(1-d/mx)*.16;ctx.lineWidth=.5;ctx.stroke();ctx.globalAlpha=1}}
function dp(p){const a=p.a*(.55+.45*Math.sin(p.l*3+p.ph));ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c;ctx.globalAlpha=a;ctx.fill();if(p.br>2){const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.br*3);g.addColorStop(0,p.c);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.globalAlpha=a*.16;ctx.fill()}ctx.globalAlpha=1}

// ── Skeleton ──
function skel(lm){const w=co.width,h=co.height;for(let i=0;i<21;i++){coCtx.beginPath();coCtx.arc(lm[i].x*w,lm[i].y*h,3,0,Math.PI*2);coCtx.fillStyle='#60a5fa';coCtx.fill()}const cs=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];coCtx.strokeStyle='rgba(150,200,255,0.6)';coCtx.lineWidth=2;for(const[a,b]of cs){coCtx.beginPath();coCtx.moveTo(lm[a].x*w,lm[a].y*h);coCtx.lineTo(lm[b].x*w,lm[b].y*h);coCtx.stroke()}const t=lm[8];coCtx.beginPath();coCtx.arc(t.x*w,t.y*h,7,0,Math.PI*2);coCtx.fillStyle='#fff';coCtx.fill()}

// ── Per frame ──
function proc(){
  if(!mpReady||cam.readyState<2)return;
  if(cam.currentTime===lvt)return;lvt=cam.currentTime;
  const r=lm.detectForVideo(cam,performance.now());
  coCtx.clearRect(0,0,co.width,co.height);
  if(!r.landmarks||!r.landmarks.length){hc.v=false;gesture='none';return}
  const l=r.landmarks[0];gesture=det(l);
  hc.x=(1-l[8].x)*W;hc.y=l[8].y*H;hc.v=true;
  const pp=pinch,pd=Math.hypot(l[4].x-l[8].x,l[4].y-l[8].y);pinch=pd<.05;
  if(pinch&&!pp)for(const p of particles){const dx=p.x-hc.x,dy=p.y-hc.y,dd=Math.hypot(dx,dy)||1;p.vx+=dx/dd*280/(1+dd/40)*.06;p.vy+=dy/dd*280/(1+dd/40)*.06}
  const nm=gmap[gesture]||mode;if(nm!==mode){mode=nm;for(const p of particles)p.c=pal[mode][Math.random()*pal[mode].length|0]}
  target=Math.max(60,Math.min(500,Math.round(Math.hypot(l[0].x-l[9].x,l[0].y-l[9].y)*1800)));
  document.querySelectorAll('.badge').forEach(b=>{b.classList.toggle('on',b.dataset.g===gmap[gesture])});
  mn.textContent=names[mode]||'';
  skel(l);
}

// ── Loops ──
function up(dt){
  const d=target-particles.length;if(d>0){for(let i=0;i<Math.min(d,5);i++)particles.push(new P)}else if(d<0)particles.splice(target,-d);
  const cx=hc.v?hc.x:W/2,cy=hc.v?hc.y:H/2;
  for(const p of particles){phys(p,dt,cx,cy);p.x+=p.vx;p.y+=p.vy;const m=50;if(p.x<-m)p.x=W+m;if(p.x>W+m)p.x=-m;if(p.y<-m)p.y=H+m;if(p.y>H+m)p.y=-m;if(p.x<0)p.vx+=.3*dt;if(p.x>W)p.vx-=.3*dt;if(p.y<0)p.vy+=.3*dt;if(p.y>H)p.vy-=.3*dt;p.l+=.005*dt;p.r=p.br*(.78+.22*Math.sin(p.l*1.5+p.ph))}
}
function draw(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(hc.x,hc.y,0,W/2,H/2,Math.max(W,H)*.8);bg.addColorStop(0,'rgba(18,18,40,0.35)');bg.addColorStop(1,'rgba(6,6,14,1)');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++)conn(particles[i],particles[j]);
  for(const p of particles)dp(p);
  if(hc.v){const t=performance.now()*.001;ctx.beginPath();ctx.arc(hc.x,hc.y,18+Math.sin(t*3)*3,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(hc.x,hc.y,4,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.55)';ctx.fill();if(pinch)for(let r=20;r<160;r+=20){ctx.beginPath();ctx.arc(hc.x,hc.y,r,0,Math.PI*2);ctx.strokeStyle=`rgba(255,180,100,${.25*(1-r/160)})`;ctx.lineWidth=1.5;ctx.stroke()}}
  fc++;const n=performance.now();if(n-lt>=500){fps=Math.round(fc/((n-lt)/1000));fc=0;lt=n;$('fps').textContent=`FPS: ${fps}`;$('cnt').textContent=`粒子: ${particles.length}`;$('gs').textContent=`手势: ${gesture}`}
}

// ── Resize ──
function rz(){W=main.width=innerWidth;H=main.height=innerHeight;co.width=240;co.height=180}
window.addEventListener('resize',rz);

// ── Mouse fallback ──
let ma=false;
window.addEventListener('mousemove',e=>{if(hc.v)return;ma=true;hc.x=e.clientX;hc.y=e.clientY;hc.v=true});
window.addEventListener('mouseleave',()=>{if(ma){hc.v=false;ma=false}});
window.addEventListener('click',()=>{if(hc.v&&mpReady)return;const ms=['flow','galaxy','burst','grid','vortex'];mode=ms[(ms.indexOf(mode)+1)%5];for(const p of particles)p.c=pal[mode][Math.random()*pal[mode].length|0]});
window.addEventListener('wheel',e=>{e.preventDefault();target=Math.max(40,Math.min(600,target+(e.deltaY>0?-25:25)))},{passive:false});
window.addEventListener('touchmove',e=>{if(hc.v)return;ma=true;hc.x=e.touches[0].clientX;hc.y=e.touches[0].clientY;hc.v=true},{passive:true});
window.addEventListener('touchend',()=>{if(ma){hc.v=false;ma=false}});

// ── Boot ──
rz();particles=Array.from({length:target},()=>new P());
requestAnimationFrame(function loop(ts){proc();up(Math.min(16.67/16.67,2.5));draw();requestAnimationFrame(loop)});

(async()=>{
  try{
    msg.textContent='📷 正在启动摄像头...';
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
    cam.srcObject=stream;await cam.play();

    msg.textContent='🧠 正在加载手势 AI 模型...';
    const v=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm');
    lm=await HandLandmarker.createFromOptions(v,{
      baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task',delegate:'GPU'},
      runningMode:'VIDEO',numHands:2,minHandDetectionConfidence:.5,minTrackingConfidence:.5
    });
    mpReady=true;msg.textContent='✅ 就绪 — 伸出手试试吧！';
    setTimeout(()=>msg.style.opacity='0',4000);
  }catch(e){msg.textContent='⚠️ 摄像头不可用 — 使用鼠标控制';console.error(e)}
})();
</script>
</body>
</html>
